<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Генератор цвета</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1 class="title">Генератор случайного цвета</h1>

      <section class="card">
        <div id="colorBox" class="color-box" aria-label="Пример цвета"></div>
        <p class="hex-label">HEX: <strong id="hexValue">#ffffff</strong></p>
        <button id="generateBtn" class="btn" type="button">Сгенерировать</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>

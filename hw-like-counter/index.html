<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Счётчик лайков</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1 class="title">❤️ Счётчик лайков</h1>

      <section class="card">
        <!-- Счётчик -->
        <div class="counter-display" aria-live="polite">
          <span id="like-value" class="counter-value">0</span>
          <span class="counter-label">лайков</span>
        </div>

        <!-- Кнопки управления -->
        <div class="buttons">
          <button id="like-btn" class="btn btn-like" type="button">❤️ Лайк</button>
          <button id="dislike-btn" class="btn btn-dislike" type="button">💔 Дизлайк</button>
          <button id="reset-btn" class="btn btn-reset" type="button">Сброс</button>
        </div>

        <!-- История последних действий -->
        <ul id="history" class="history"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>

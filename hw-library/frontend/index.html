<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HW: Библиотека</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1 class="page-title">📚 Библиотека</h1>

  <div class="grid">

    <!-- ── Книги (ГОТОВО) ──────────────────────────────────── -->
    <section class="card">
      <h2>📖 Книги <code>CRUD готов</code></h2>
      <ul id="books-list" class="list"></ul>
      <form id="books-form" class="form">
        <input id="book-title"  class="input" type="text" placeholder="Название" />
        <input id="book-author" class="input" type="text" placeholder="Автор" />
        <button class="btn" type="submit">Добавить</button>
      </form>
      <p id="books-error" class="error"></p>
    </section>

    <!-- ── Авторы (ЗАДАНИЕ) ────────────────────────────────── -->
    <section class="card">
      <h2>✍️ Авторы <code>⚠️ только GET</code></h2>
      <ul id="authors-list" class="list"></ul>

      <!-- ЗАДАНИЕ: раскомментируй форму когда допишешь POST на бэкенде -->
      <!--
      <form id="authors-form" class="form">
        <input id="author-name" class="input" type="text" placeholder="Имя автора" />
        <button class="btn" type="submit">Добавить</button>
      </form>
      <p id="authors-error" class="error"></p>
      -->
      <p class="hint">⚠️ Добавление и удаление авторов — твоё задание!</p>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>

<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Счетчик очков</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1 class="title">Счетчик очков в игре</h1>

      <section class="card" aria-label="Счетчик">
        <div class="value" aria-live="polite">
          <span class="valueLabel">Текущее значение</span>
          <span id="counterValue" class="valueNumber">0</span>
        </div>

        <div class="buttons">
          <button id="plusBtn" class="btn" type="button">+1</button>
          <button id="minusBtn" class="btn" type="button">-1</button>
          <button id="resetBtn" class="btn btnSecondary" type="button">Сброс</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
